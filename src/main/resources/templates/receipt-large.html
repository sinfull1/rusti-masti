<!DOCTYPE html>
<!-- LARGE receipt (640px). Larger type and spacing. -->
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 640px; background: #fff;
            font-family: "Liberation Sans","DejaVu Sans",Arial,sans-serif; color: #1f2933;
            -webkit-font-smoothing: none; font-smooth: never; text-rendering: optimizeSpeed; }
        .receipt { padding: 36px 42px 31px; }
        .brand { text-align: center; border-bottom: 3px solid #111827; padding-bottom: 21px; }
        .brand h1 { font-size: 29px; letter-spacing: 1px; text-transform: uppercase; }
        .brand .addr { font-size: 14px; color: #000; margin-top: 8px; line-height: 1.5; }
        .meta { margin-top: 23px; font-size: 16px; color: #000; }
        .meta .row { display: flex; justify-content: space-between; padding: 4px 0; }
        .meta .row .val { font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 23px; font-size: 16px; }
        thead th { text-align: left; text-transform: uppercase; font-size: 13px; letter-spacing: .5px;
            color: #000; border-bottom: 1px solid #000; padding: 10px 0; }
        thead th.num, tbody td.num { text-align: right; }
        tbody td { padding: 12px 0; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
        tbody .name { font-weight: 600; color: #111827; }
        tbody .sku { color: #000; font-size: 13px; margin-top: 3px; }
        .totals { margin-top: 18px; font-size: 16px; }
        .totals .row { display: flex; justify-content: space-between; padding: 5px 0; }
        .totals .discount .val { color: #ff0000; }
        .totals .grand { margin-top: 10px; padding-top: 16px; border-top: 3px solid #111827;
            font-size: 21px; font-weight: 700; }
        .pay { margin-top: 21px; font-size: 16px; color: #000; display: flex; justify-content: space-between; }
        .footer { margin-top: 29px; text-align: center; font-size: 14px; color: #000;
            border-top: 1px dashed #000; padding-top: 21px; line-height: 1.6; }
        .footer .thanks { font-size: 17px; color: #111827; font-weight: 600; margin-bottom: 5px; }
    </style>
</head>
<body th:insert="~{receipt-fragment :: body}"></body>
</html>
