<!DOCTYPE html>
<!-- EXTRA-LARGE receipt (800px). Largest type and spacing. -->
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 800px; background: #fff;
            font-family: "Liberation Sans","DejaVu Sans",Arial,sans-serif; color: #1f2933;
            -webkit-font-smoothing: none; font-smooth: never; text-rendering: optimizeSpeed; }
        .receipt { padding: 45px 51px 38px; }
        .brand { text-align: center; border-bottom: 3px solid #111827; padding-bottom: 26px; }
        .brand h1 { font-size: 35px; letter-spacing: 1.5px; text-transform: uppercase; }
        .brand .addr { font-size: 18px; color: #000; margin-top: 10px; line-height: 1.5; }
        .meta { margin-top: 29px; font-size: 19px; color: #000; }
        .meta .row { display: flex; justify-content: space-between; padding: 5px 0; }
        .meta .row .val { font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 29px; font-size: 19px; }
        thead th { text-align: left; text-transform: uppercase; font-size: 16px; letter-spacing: .5px;
            color: #000; border-bottom: 2px solid #000; padding: 13px 0; }
        thead th.num, tbody td.num { text-align: right; }
        tbody td { padding: 14px 0; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
        tbody .name { font-weight: 600; color: #111827; }
        tbody .sku { color: #000; font-size: 16px; margin-top: 4px; }
        .totals { margin-top: 22px; font-size: 19px; }
        .totals .row { display: flex; justify-content: space-between; padding: 6px 0; }
        .totals .discount .val { color: #ff0000; }
        .totals .grand { margin-top: 13px; padding-top: 19px; border-top: 3px solid #111827;
            font-size: 26px; font-weight: 700; }
        .pay { margin-top: 26px; font-size: 19px; color: #000; display: flex; justify-content: space-between; }
        .footer { margin-top: 35px; text-align: center; font-size: 18px; color: #000;
            border-top: 2px dashed #000; padding-top: 26px; line-height: 1.6; }
        .footer .thanks { font-size: 21px; color: #111827; font-weight: 600; margin-bottom: 6px; }
    </style>
</head>
<body th:insert="~{receipt-fragment :: body}"></body>
</html>
