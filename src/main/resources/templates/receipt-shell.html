<!DOCTYPE html>
<!--
  Resident SHELL: head + CSS + a JS body-injector. Loaded into the WebView ONCE per cell. Thereafter,
  inject mode swaps only the body content via __render(base64), skipping the whole loadContent /
  navigation / parse-from-scratch path. Reload mode splices the fragment into __BODY__ instead.
  This file is read RAW (not via Thymeleaf) so the script and CSS pass through untouched.
-->
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 480px;
            background: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #1f2933;
            /* Disable anti-aliasing: hard edges before the 4-colour quantisation step. */
            -webkit-font-smoothing: none;
            font-smooth: never;
            text-rendering: optimizeSpeed;
        }
        .receipt { padding: 28px 32px 24px; }

        .brand { text-align: center; border-bottom: 2px solid #111827; padding-bottom: 16px; }
        .brand h1 { font-size: 22px; letter-spacing: 1px; text-transform: uppercase; }
        .brand .addr { font-size: 11px; color: #000000; margin-top: 6px; line-height: 1.5; }

        .meta { margin-top: 18px; font-size: 12px; color: #000000; }
        .meta .row { display: flex; justify-content: space-between; padding: 3px 0; }
        .meta .row .label { color: #000000; }
        .meta .row .val { font-weight: 600; }

        table { width: 100%; border-collapse: collapse; margin-top: 18px; font-size: 12px; }
        thead th {
            text-align: left; text-transform: uppercase; font-size: 10px; letter-spacing: .5px;
            color: #000000; border-bottom: 1px solid #000000; padding: 8px 0;
        }
        thead th.num, tbody td.num { text-align: right; }
        tbody td { padding: 9px 0; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
        tbody .name { font-weight: 600; color: #111827; }
        tbody .sku { color: #000000; font-size: 10px; margin-top: 2px; }

        .totals { margin-top: 14px; font-size: 12px; }
        .totals .row { display: flex; justify-content: space-between; padding: 4px 0; }
        .totals .row .label { color: #000000; }
        .totals .discount .val { color: #ff0000; }
        .totals .grand {
            margin-top: 8px; padding-top: 12px; border-top: 2px solid #111827;
            font-size: 16px; font-weight: 700;
        }

        .pay { margin-top: 16px; font-size: 12px; color: #000000;
               display: flex; justify-content: space-between; }
        .pay .label { color: #000000; }

        .footer { margin-top: 22px; text-align: center; font-size: 11px; color: #000000;
                  border-top: 1px dashed #000000; padding-top: 16px; line-height: 1.6; }
        .footer .thanks { font-size: 13px; color: #111827; font-weight: 600; margin-bottom: 4px; }
    </style>
    <script>
        // Inject mode: replace the body with a fresh fragment. b64 is the UTF-8 fragment, base64-encoded
        // server-side; escape(atob(...)) then decodeURIComponent reverses that to correct Unicode
        // (bullets, accents). Returns body.scrollHeight so Java gets layout height in the same round-trip.
        function __render(b64) {
            document.body.innerHTML = decodeURIComponent(escape(atob(b64)));
            return Math.ceil(Math.max(document.documentElement.scrollHeight, document.body.scrollHeight));
        }
    </script>
</head>
<body>__BODY__</body>
</html>
