micronaut.application.name=image

# --- HTTP server ---
micronaut.server.port=8080
# Cap request body: inlined HTML docs, not uploads. Protects the memory budget.
micronaut.server.max-request-size=4MB
micronaut.server.multipart.max-file-size=4MB

# --- Templating & sizes: JSON payload -> HTML via Thymeleaf ---
# Each size variant maps to a full standalone template (its own layout/CSS) and output geometry.
# The request selects one with ?size=<name>; missing/blank uses render.default-size.
render.default-size=medium
render.sizes.small.template=receipt-small
render.sizes.small.width=320
render.sizes.small.device-scale=2.0
render.sizes.medium.template=receipt-medium
render.sizes.medium.width=480
render.sizes.medium.device-scale=2.0
render.sizes.large.template=receipt-large
render.sizes.large.width=640
render.sizes.large.device-scale=2.0
render.sizes.xlarge.template=receipt-xlarge
render.sizes.xlarge.width=800
render.sizes.xlarge.device-scale=2.0

# Rendering backend (see RenderDispatcher):
#   rust    -> Blitz native renderer only (fast, no JS, ~95% CSS fidelity).
#   webview -> JavaFX WebView only (full browser).
#   auto    -> Blitz first; fall back to WebView on error, or when a request sends "renderMode":"browser".
render.backend=auto
# Path to the Rust render library; the Blitz bean loads only if this file exists (else WebView-only).
render.blitz.lib-path=/app/libblitz_render.so
# Renderer tunables passed to the native lib at init (env-overridable). Palette = 4 RRGGBB colours in
# index order (black, white, red, blue); sat/lum drive the anti-alias→4-colour quantiser; default-height
# is the layout height when auto-height is off; max-width/max-height clamp the output buffer.
render.blitz.palette=000000,FFFFFF,FF0000,0000FF
render.blitz.sat-threshold=60
render.blitz.lum-threshold=180
render.blitz.default-height=800
render.blitz.max-width=4000
render.blitz.max-height=8000
# Emit the 2-bit indexed {black,white,red,blue} PNG (both backends). false => RGBA (Blitz path only).
render.quantize=true

# Blitz admission control (bounds native render concurrency; sheds overload as HTTP 503):
#   max-concurrent  simultaneous native renders. 0 => availableProcessors (respects the CPU limit).
#                   Software rasterization is CPU-bound, so ~= core count is optimal.
#   max-queue       extra requests allowed to wait for a slot before shedding with 503.
render.blitz.max-concurrent=0
render.blitz.max-queue=32
# Hard per-render deadline (ms). Safety net over the input caps; on timeout the client gets an error.
render.blitz.timeout-ms=10000

# Payload size/complexity limits (reject with 400) — stop a small body expanding into a huge DOM.
render.limits.max-list-size=1000
render.limits.max-map-size=200
render.limits.max-string-length=8192
render.limits.max-depth=12
render.limits.max-total-nodes=20000
# Output geometry. Receipts are a fixed narrow width; height follows content when auto-height=true.
render.width=480
render.auto-height=true
# Fallback height used only when auto-height=false or measurement fails.
render.height=1200
# Pixel density of the PNG (2.0 = crisp/retina). Costs ~scale^2 in memory and paint time.
render.device-scale=2.0

# --- Render pool (the knobs that enforce 500 MB / ~10 img/s; see DESIGN.md) ---
# Resident WebKit engines. 1-2 under a 500 MB ceiling; each engine is the dominant RAM cost.
render.pool.size=2
# Extra jobs allowed to wait for a cell before we shed with 503. Bounds in-flight image buffers.
render.queue.max=16
# Hard per-render deadline. One hung page must not wedge a scarce cell.
render.timeout-ms=5000
# Park a cell on about:blank after this many renders to curb WebKit native-memory creep.
render.recycle-after=200
# Settle delay (ms) before snapshot: WebKit commits its paint a beat after the DOM lays out, so an
# immediate capture is blank. Two values, because the two modes paint at different speeds:
#   settle-ms         reload mode — fresh parse + font/style resolution, needs a longer settle (~80).
#   inject-settle-ms  inject mode — swaps already-styled content, paints faster; 20 validated under
#                     load, 30 shipped for margin. This is the dominant per-image cost, so it is the
#                     main throughput lever (see the settle sweep in DESIGN.md).
render.settle-ms=80
render.inject-settle-ms=30